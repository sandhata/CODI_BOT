name: CODi Auto Merge Control

on:
  status

jobs:
  toggle-merge:
    runs-on: ubuntu-latest
    if: github.event.context == 'CODi Validation'

    steps:
      - name: Get PR number from commit SHA
        id: get-pr
        run: |
          SHA="${{ github.event.sha }}"
          echo "Looking for PR with SHA: $SHA"

          PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=100" \
            --jq ".[] | select(.head.sha == \"$SHA\") | .number" | head -1)

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Found PR: $PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ CHECKS PASSED → Enable auto-merge in repo settings + enable on PR
      - name: Enable auto-merge when CODi validation passes
        if: |
          github.event.state == 'success' &&
          steps.get-pr.outputs.pr_number != ''
        run: |
          echo "✅ Enabling auto-merge for PR #${{ steps.get-pr.outputs.pr_number }}"

          # Enable auto-merge in repo settings
          gh api "repos/${{ github.repository }}" \
            --method PATCH \
            --field allow_auto_merge=true

          # Enable auto-merge on the PR
          gh pr merge ${{ steps.get-pr.outputs.pr_number }} \
            --auto \
            --squash \
            --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ❌ CHECKS FAILED → Disable auto-merge in repo settings entirely
      - name: Show merge pull request when CODi validation fails
        if: |
          github.event.state == 'failure' &&
          steps.get-pr.outputs.pr_number != ''
        run: |
          echo "❌ Disabling auto-merge setting for PR #${{ steps.get-pr.outputs.pr_number }}"

          # Disable auto-merge in repo settings
          # This forces GitHub to show "Merge pull request" button
          gh api "repos/${{ github.repository }}" \
            --method PATCH \
            --field allow_auto_merge=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
